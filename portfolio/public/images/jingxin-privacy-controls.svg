<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-sm" x="-4%" y="-8%" width="108%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="320" rx="12" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Main card -->
  <rect x="24" y="20" width="472" height="280" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>

  <!-- Card header -->
  <text x="44" y="52" font-size="13" font-weight="700" fill="#374151" letter-spacing="0.5">MY JOURNAL</text>
  <text x="44" y="68" font-size="11" fill="#9CA3AF">March 8, 2026</text>

  <!-- Divider -->
  <line x1="44" y1="78" x2="476" y2="78" stroke="#F3F4F6" stroke-width="1"/>

  <!-- Text area background -->
  <rect x="44" y="88" width="432" height="108" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Sample reflection text -->
  <text x="56" y="110" font-size="13" fill="#4B5563" line-height="1.6">
    <tspan x="56" dy="0">Today during meditation, I noticed how easily my mind</tspan>
    <tspan x="56" dy="20">wanders to planning and worrying. Instead of judging</tspan>
    <tspan x="56" dy="20">myself, I practiced returning to the breath with patience.</tspan>
    <tspan x="56" dy="20">This felt like real progress -- meeting myself with</tspan>
    <tspan x="56" dy="20" fill="#9CA3AF" font-style="italic">the same compassion we study in the teachings...</tspan>
  </text>

  <!-- Privacy selector label -->
  <text x="44" y="212" font-size="11" font-weight="600" fill="#6B7280" letter-spacing="0.3">WHO CAN SEE THIS</text>

  <!-- Privacy selector - segmented control -->
  <!-- Container -->
  <rect x="44" y="220" width="380" height="40" rx="10" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1"/>

  <!-- Option 1: Private (SELECTED) -->
  <rect x="47" y="223" width="92" height="34" rx="8" fill="#5B9B8E" filter="url(#shadow-sm)"/>
  <!-- Lock icon -->
  <g transform="translate(62, 233)">
    <rect x="0" y="4" width="10" height="8" rx="2" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
    <path d="M2,4 V2 a3,3 0 0,1 6,0 V4" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="78" y="244" font-size="11" font-weight="600" fill="#FFFFFF">Private</text>

  <!-- Option 2: Teacher -->
  <g opacity="0.7">
    <!-- Person icon -->
    <circle cx="160" cy="235" r="4" fill="none" stroke="#6B7280" stroke-width="1.3"/>
    <path d="M152,248 a8,6 0 0,1 16,0" fill="none" stroke="#6B7280" stroke-width="1.3"/>
    <text x="172" y="244" font-size="11" fill="#6B7280">Teacher</text>
  </g>

  <!-- Option 3: Classmates -->
  <g opacity="0.7">
    <!-- Group icon -->
    <circle cx="254" cy="235" r="3.5" fill="none" stroke="#6B7280" stroke-width="1.2"/>
    <circle cx="262" cy="236" r="3" fill="none" stroke="#6B7280" stroke-width="1.2"/>
    <path d="M247,247 a7,5 0 0,1 14,0" fill="none" stroke="#6B7280" stroke-width="1.2"/>
    <path d="M256,247 a6,4.5 0 0,1 12,0" fill="none" stroke="#6B7280" stroke-width="1.2"/>
    <text x="272" y="244" font-size="11" fill="#6B7280">Group</text>
  </g>

  <!-- Option 4: Everyone -->
  <g opacity="0.7">
    <!-- Globe icon -->
    <circle cx="354" cy="240" r="7" fill="none" stroke="#6B7280" stroke-width="1.2"/>
    <ellipse cx="354" cy="240" rx="3.5" ry="7" fill="none" stroke="#6B7280" stroke-width="1"/>
    <line x1="347" y1="240" x2="361" y2="240" stroke="#6B7280" stroke-width="1"/>
    <text x="366" y="244" font-size="11" fill="#6B7280">Public</text>
  </g>

  <!-- Rejoice button -->
  <rect x="44" y="270" width="140" height="24" rx="12" fill="#F0F6F5" stroke="#5B9B8E" stroke-width="1" opacity="0.9"/>
  <text x="58" y="286" font-size="12">&#x1F64F;</text>
  <text x="74" y="286" font-size="11" fill="#5B9B8E" font-weight="500">&#x968F;&#x559C;&#x8D5E;&#x53F9;</text>
  <text x="130" y="286" font-size="11" fill="#9CA3AF">&#xB7; 12</text>

  <!-- Save button -->
  <rect x="416" y="268" width="68" height="28" rx="8" fill="#5B9B8E"/>
  <text x="434" y="286" font-size="12" font-weight="600" fill="#FFFFFF">Save</text>

</svg>