<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F6FAF9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F6F5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bgGradient)"/>

  <!-- Left side: Book/Scroll icon -->
  <g id="book-section">
    <!-- Book spine -->
    <rect x="100" y="140" width="120" height="220" fill="none" stroke="#5B9B8E" stroke-width="2" rx="6"/>
    <!-- Pages -->
    <line x1="115" y1="160" x2="205" y2="160" stroke="#5B9B8E" stroke-width="1.5"/>
    <line x1="115" y1="185" x2="205" y2="185" stroke="#5B9B8E" stroke-width="1.5"/>
    <line x1="115" y1="210" x2="205" y2="210" stroke="#5B9B8E" stroke-width="1.5"/>
    <line x1="115" y1="235" x2="205" y2="235" stroke="#5B9B8E" stroke-width="1.5"/>
    <line x1="115" y1="260" x2="205" y2="260" stroke="#5B9B8E" stroke-width="1.5"/>
    <line x1="115" y1="285" x2="205" y2="285" stroke="#5B9B8E" stroke-width="1.5"/>
    <line x1="115" y1="310" x2="205" y2="310" stroke="#5B9B8E" stroke-width="1.5"/>
    <line x1="115" y1="335" x2="205" y2="335" stroke="#5B9B8E" stroke-width="1.5"/>

    <!-- Label -->
    <text x="160" y="390" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">Theory</text>
  </g>

  <!-- Center: Platform/Device mockup -->
  <g id="platform">
    <!-- Device frame -->
    <rect x="450" y="80" width="300" height="380" fill="#ffffff" stroke="#5B9B8E" stroke-width="3" rx="12"/>

    <!-- Screen content - simplified -->
    <!-- Header bar -->
    <rect x="460" y="95" width="280" height="40" fill="#F6FAF9" rx="4"/>
    <circle cx="475" cy="115" r="4" fill="#5B9B8E"/>
    <circle cx="490" cy="115" r="4" fill="#5B9B8E"/>
    <circle cx="505" cy="115" r="4" fill="#5B9B8E"/>

    <!-- Content blocks -->
    <rect x="460" y="150" width="130" height="12" fill="#5B9B8E" rx="2"/>
    <rect x="460" y="175" width="200" height="8" fill="#E0E0E0" rx="2"/>
    <rect x="460" y="190" width="190" height="8" fill="#E0E0E0" rx="2"/>

    <!-- Icon section inside device -->
    <circle cx="600" cy="270" r="35" fill="#F6FAF9" stroke="#5B9B8E" stroke-width="2"/>
    <!-- Learning icon (scroll + play) -->
    <path d="M 585 255 L 585 285 M 580 260 L 620 260" stroke="#5B9B8E" stroke-width="2" stroke-linecap="round"/>
    <polygon points="600,275 590,270 590,280" fill="#5B9B8E"/>

    <!-- Bottom section -->
    <rect x="460" y="330" width="280" height="2" fill="#E0E0E0"/>
    <rect x="470" y="345" width="120" height="6" fill="#5B9B8E" rx="2"/>
    <rect x="470" y="360" width="100" height="6" fill="#E0E0E0" rx="2"/>
  </g>

  <!-- Right side: Person/Meditation icon -->
  <g id="meditation-section">
    <!-- Head -->
    <circle cx="950" cy="170" r="35" fill="none" stroke="#5B9B8E" stroke-width="2"/>
    <!-- Body -->
    <line x1="950" y1="205" x2="950" y2="290" stroke="#5B9B8E" stroke-width="2" stroke-linecap="round"/>
    <!-- Left arm -->
    <line x1="950" y1="230" x2="900" y2="260" stroke="#5B9B8E" stroke-width="2" stroke-linecap="round"/>
    <!-- Right arm -->
    <line x1="950" y1="230" x2="1000" y2="260" stroke="#5B9B8E" stroke-width="2" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="930" y1="290" x2="910" y2="340" stroke="#5B9B8E" stroke-width="2" stroke-linecap="round"/>
    <line x1="970" y1="290" x2="990" y2="340" stroke="#5B9B8E" stroke-width="2" stroke-linecap="round"/>

    <!-- Meditation circles around person -->
    <circle cx="950" cy="100" r="12" fill="none" stroke="#5B9B8E" stroke-width="1.5" opacity="0.6"/>
    <circle cx="1020" cy="150" r="12" fill="none" stroke="#5B9B8E" stroke-width="1.5" opacity="0.6"/>
    <circle cx="880" cy="150" r="12" fill="none" stroke="#5B9B8E" stroke-width="1.5" opacity="0.6"/>

    <!-- Label -->
    <text x="950" y="390" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#333333" text-anchor="middle">Practice</text>
  </g>

  <!-- Bridge connecting left to right -->
  <g id="bridge">
    <!-- Bridge line from book to device -->
    <line x1="240" y1="250" x2="450" y2="250" stroke="#5B9B8E" stroke-width="2" stroke-dasharray="5,5"/>

    <!-- Bridge line from device to person -->
    <line x1="750" y1="250" x2="900" y2="250" stroke="#5B9B8E" stroke-width="2" stroke-dasharray="5,5"/>

    <!-- Connection points -->
    <circle cx="450" cy="250" r="6" fill="#5B9B8E"/>
    <circle cx="750" cy="250" r="6" fill="#5B9B8E"/>
  </g>

  <!-- Title at bottom -->
  <text x="600" y="550" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#333333" text-anchor="middle">Bridging Theory & Practice</text>
</svg>
