      <rect width="3" height="36" rx="1.5" fill="#D1D5DB"/>
      <circle cx="22" cy="18" r="8" fill="#F3F4F6"/>
      <path d="M18.5 14.5 L25.5 21.5 M25.5 14.5 L18.5 21.5" stroke="#9CA3AF" stroke-width="1.5" stroke-linecap="round" fill="none"/>
