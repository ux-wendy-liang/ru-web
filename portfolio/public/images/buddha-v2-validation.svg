<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="300" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="30" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#333333" text-anchor="middle">Validation Journey</text>

  <!-- Timeline line -->
  <line x1="100" y1="140" x2="700" y2="140" stroke="#5B9B8E" stroke-width="2"/>

  <!-- Step 1: Observed Problem -->
  <g id="step1">
    <!-- Node circle -->
    <circle cx="150" cy="140" r="30" fill="#F0F6F5" stroke="#5B9B8E" stroke-width="2"/>
    <text x="150" y="148" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#5B9B8E" text-anchor="middle">1</text>

    <!-- Label -->
    <text x="150" y="195" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">Observed</text>
    <text x="150" y="215" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">Problem</text>

    <!-- Duration -->
    <text x="150" y="240" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#666666" text-anchor="middle">(1 year)</text>
  </g>

  <!-- Step 2: Proposed Model -->
  <g id="step2">
    <!-- Node circle -->
    <circle cx="400" cy="140" r="30" fill="#F0F6F5" stroke="#5B9B8E" stroke-width="2"/>
    <text x="400" y="148" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#5B9B8E" text-anchor="middle">2</text>

    <!-- Label -->
    <text x="400" y="190" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">Proposed 50/50</text>
    <text x="400" y="210" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">Model to Teacher</text>
  </g>

  <!-- Step 3: Got Approval -->
  <g id="step3">
    <!-- Node circle -->
    <circle cx="650" cy="140" r="30" fill="#F0F6F5" stroke="#5B9B8E" stroke-width="2"/>
    <text x="650" y="148" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#5B9B8E" text-anchor="middle">3</text>

    <!-- Label -->
    <text x="650" y="190" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">Got Approval</text>
    <text x="650" y="210" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">to Execute</text>

    <!-- Location -->
    <text x="650" y="235" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#5B9B8E" text-anchor="middle" font-weight="bold">North America</text>
  </g>

  <!-- Checkmark icons inside nodes -->
  <g id="checkmarks">
    <!-- Step 1 check -->
    <path d="M 140 140 L 145 150 L 160 130" fill="none" stroke="#5B9B8E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0"/>

    <!-- Step 2 check -->
    <path d="M 390 140 L 395 150 L 410 130" fill="none" stroke="#5B9B8E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0"/>

    <!-- Step 3 check -->
    <path d="M 640 140 L 645 150 L 660 130" fill="none" stroke="#5B9B8E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0"/>
  </g>

  <!-- Arrow indicators between steps -->
  <g id="arrows">
    <path d="M 180 140 L 370 140" fill="none" stroke="#5B9B8E" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
    <path d="M 430 140 L 620 140" fill="none" stroke="#5B9B8E" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
  </g>
</svg>
