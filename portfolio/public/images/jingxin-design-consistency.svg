  <rect x="36" y="210" width="56" height="18" rx="3" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="0.5"/>
  <text x="64" y="222" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">Card A</text>
  <rect x="100" y="210" width="56" height="18" rx="3" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="0.5"/>
  <text x="128" y="222" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">Card B</text>
  <rect x="142" y="234" width="56" height="18" rx="3" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="0.5"/>
  <text x="170" y="246" font-family="system-ui, sans-serif" font-size="7" fill="#6B7280" text-anchor="middle">Card C</text>
