<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" fill="none">
  <style>
    text { font-family: 'Lato', Arial, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="800" height="340" rx="16" fill="#F8F9FA"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">Filters at Every Level — From Broad to Precise</text>

  <!-- Dashboard level (outermost) -->
  <rect x="30" y="55" width="740" height="270" rx="12" fill="white" stroke="#C2807A" stroke-width="2" stroke-dasharray="6 3"/>
  <rect x="40" y="60" width="140" height="24" rx="4" fill="#FBF3F2"/>
  <text x="110" y="76" text-anchor="middle" font-size="11" font-weight="700" fill="#8B554E">DASHBOARD FILTER</text>
  <text x="200" y="76" font-size="10" fill="#9CA3AF">applies to all tabs</text>

  <!-- Tab level -->
  <rect x="55" y="95" width="700" height="215" rx="10" fill="white" stroke="#7E97AD" stroke-width="2" stroke-dasharray="6 3"/>
  <rect x="65" y="100" width="95" height="22" rx="4" fill="#F2F5F8"/>
  <text x="112" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="#4E6577">TAB FILTER</text>
  <text x="175" y="115" font-size="10" fill="#9CA3AF">applies to all groups in this tab</text>

  <!-- Group level -->
  <rect x="80" y="132" width="650" height="163" rx="8" fill="white" stroke="#5B9B8E" stroke-width="2" stroke-dasharray="6 3"/>
  <rect x="90" y="137" width="110" height="22" rx="4" fill="#F0F6F5"/>
  <text x="145" y="152" text-anchor="middle" font-size="11" font-weight="700" fill="#3E6B61">GROUP FILTER</text>
  <text x="215" y="152" font-size="10" fill="#9CA3AF">applies to charts in this group</text>

  <!-- Charts inside group -->
  <!-- Chart 1 -->
  <rect x="105" y="170" width="185" height="110" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <rect x="115" y="178" width="90" height="18" rx="3" fill="#F3F4F6"/>
  <text x="160" y="191" text-anchor="middle" font-size="10" font-weight="700" fill="#6B7280">CHART FILTER</text>
  <!-- Mini bar chart -->
  <rect x="125" y="210" width="20" height="50" rx="3" fill="#5B9B8E" opacity="0.3"/>
  <rect x="155" y="225" width="20" height="35" rx="3" fill="#5B9B8E" opacity="0.5"/>
  <rect x="185" y="215" width="20" height="45" rx="3" fill="#5B9B8E" opacity="0.4"/>
  <rect x="215" y="235" width="20" height="25" rx="3" fill="#5B9B8E" opacity="0.6"/>
  <text x="197" y="275" text-anchor="middle" font-size="10" fill="#9CA3AF">Chart A</text>

  <!-- Chart 2 -->
  <rect x="315" y="170" width="185" height="110" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <rect x="325" y="178" width="90" height="18" rx="3" fill="#F3F4F6"/>
  <text x="370" y="191" text-anchor="middle" font-size="10" font-weight="700" fill="#6B7280">CHART FILTER</text>
  <!-- Mini line chart -->
  <polyline points="335,250 365,225 395,235 425,210 455,220 475,205" stroke="#7E97AD" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="335" cy="250" r="3" fill="#7E97AD"/>
  <circle cx="365" cy="225" r="3" fill="#7E97AD"/>
  <circle cx="395" cy="235" r="3" fill="#7E97AD"/>
  <circle cx="425" cy="210" r="3" fill="#7E97AD"/>
  <circle cx="455" cy="220" r="3" fill="#7E97AD"/>
  <circle cx="475" cy="205" r="3" fill="#7E97AD"/>
  <text x="407" y="275" text-anchor="middle" font-size="10" fill="#9CA3AF">Chart B</text>

  <!-- Chart 3 -->
  <rect x="525" y="170" width="185" height="110" rx="8" fill="white" stroke="#D1D5DB" stroke-width="1.5"/>
  <rect x="535" y="178" width="90" height="18" rx="3" fill="#F3F4F6"/>
  <text x="580" y="191" text-anchor="middle" font-size="10" font-weight="700" fill="#6B7280">CHART FILTER</text>
  <!-- Mini donut chart -->
  <circle cx="617" cy="235" r="28" fill="none" stroke="#B09A82" stroke-width="12" stroke-dasharray="44 132" stroke-dashoffset="0"/>
  <circle cx="617" cy="235" r="28" fill="none" stroke="#5B9B8E" stroke-width="12" stroke-dasharray="66 110" stroke-dashoffset="-44"/>
  <circle cx="617" cy="235" r="28" fill="none" stroke="#7E97AD" stroke-width="12" stroke-dasharray="66 110" stroke-dashoffset="-110"/>
  <circle cx="617" cy="235" r="14" fill="white"/>
  <text x="617" y="275" text-anchor="middle" font-size="10" fill="#9CA3AF">Chart C</text>
</svg>