<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- LEFT SECTION - BEFORE -->
  <g id="before-section">
    <!-- Title -->
    <text x="120" y="40" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#333333">Before</text>
    <text x="80" y="75" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666666" text-anchor="middle" width="80">Heavy theory,</text>
    <text x="80" y="92" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#666666" text-anchor="middle">no application</text>

    <!-- Background box -->
    <rect x="30" y="110" width="200" height="240" fill="#FBF3F2" rx="8" stroke="#C2807A" stroke-width="1"/>

    <!-- Reading bar section -->
    <text x="45" y="145" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#333333">Reading</text>
    <rect x="45" y="155" width="160" height="50" fill="#C2807A" rx="4"/>
    <text x="130" y="188" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">95%</text>

    <!-- Practice bar section -->
    <text x="45" y="230" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#333333">Practice</text>
    <rect x="45" y="240" width="8" height="80" fill="#E8A39E" rx="2"/>
    <text x="90" y="283" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#C2807A">5%</text>
  </g>

  <!-- ARROW CONNECTOR -->
  <g id="arrow">
    <line x1="260" y1="230" x2="340" y2="230" stroke="#5B9B8E" stroke-width="3"/>
    <!-- Arrow head -->
    <polygon points="340,230 325,220 330,230 325,240" fill="#5B9B8E"/>
  </g>

  <!-- RIGHT SECTION - AFTER -->
  <g id="after-section">
    <!-- Title -->
    <text x="570" y="40" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="bold" fill="#333333">After</text>
    <text x="570" y="75" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#5B9B8E" text-anchor="middle">Learn → Practice →</text>
    <text x="570" y="92" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#5B9B8E" text-anchor="middle">Benefit → Repeat</text>

    <!-- Background box -->
    <rect x="520" y="110" width="200" height="240" fill="#F0F6F5" rx="8" stroke="#5B9B8E" stroke-width="1"/>

    <!-- Reading bar section -->
    <text x="535" y="145" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#333333">Reading</text>
    <rect x="535" y="155" width="80" height="50" fill="#5B9B8E" rx="4"/>
    <text x="575" y="188" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">50%</text>

    <!-- Practice bar section -->
    <text x="535" y="230" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#333333">Practice</text>
    <rect x="535" y="240" width="80" height="80" fill="#5B9B8E" rx="4"/>
    <text x="575" y="287" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">50%</text>
  </g>
</svg>
