<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Style 6: Minimal - W above, L below as underline -->
  <circle cx="20" cy="20" r="19" fill="#1a1a1a"/>
  <!-- W centered -->
  <path d="M8,11 L12,24 L17,15 L22,24 L26,11" stroke="#ffffff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- L as horizontal underline bar -->
  <line x1="10" y1="30" x2="32" y2="30" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
</svg>
