<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="60" fill="#FBF3F2"/>
  <!-- Hair -->
  <path d="M35 52c0-18 11-30 25-30s25 12 25 30v4c0 2-1 3-2 3H37c-1 0-2-1-2-3v-4z" fill="#3D2E1F"/>
  <!-- Face -->
  <ellipse cx="60" cy="62" rx="20" ry="22" fill="#FDDCB5"/>
  <!-- Hair bangs -->
  <path d="M38 48c2-14 11-24 22-24s20 10 22 24c0 1-1 2-2 1-3-4-8-7-14-7h-2c-8 0-14 3-18 7-2 2-4 1-4-1h-4z" fill="#3D2E1F"/>
  <!-- Eyes - curious, wide -->
  <circle cx="51" cy="60" r="3" fill="#3D2E1F"/>
  <circle cx="69" cy="60" r="3" fill="#3D2E1F"/>
  <circle cx="52" cy="59" r="1" fill="white"/>
  <circle cx="70" cy="59" r="1" fill="white"/>
  <!-- Eyebrows - slightly raised (curious) -->
  <path d="M46 54c2-2 5-3 8-2" stroke="#3D2E1F" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M66 52c3-1 6 0 8 2" stroke="#3D2E1F" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Mouth - slight uncertain smile -->
  <path d="M54 72c3 3 9 3 12 0" stroke="#3D2E1F" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Blush -->
  <ellipse cx="45" cy="67" rx="4" ry="2.5" fill="#F5C4B8" opacity="0.5"/>
  <ellipse cx="75" cy="67" rx="4" ry="2.5" fill="#F5C4B8" opacity="0.5"/>
  <!-- Question mark floating -->
  <text x="82" y="38" font-family="Georgia, serif" font-size="18" fill="#C2807A" font-weight="bold">?</text>
  <!-- Shoulders/top of body -->
  <path d="M30 105c0-15 13-22 30-22s30 7 30 22v15H30v-15z" fill="#E8D5C4"/>
</svg>