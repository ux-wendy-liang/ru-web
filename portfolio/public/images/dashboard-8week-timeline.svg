<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" fill="none">
  <style>
    text { font-family: 'Lato', Arial, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="900" height="200" rx="16" fill="#F8F9FA"/>

  <!-- Timeline line -->
  <line x1="60" y1="100" x2="840" y2="100" stroke="#D1D5DB" stroke-width="3" stroke-linecap="round"/>

  <!-- Week markers and segments -->
  <!-- Segment 1: Research (Week 1-2) - Teal -->
  <rect x="60" y="93" width="190" height="14" rx="7" fill="#5B9B8E" opacity="0.85"/>
  <!-- Segment 2: Design (Week 3-4) - Blue-gray -->
  <rect x="255" y="93" width="190" height="14" rx="7" fill="#7E97AD" opacity="0.85"/>
  <!-- Segment 3: Specs (Week 5-6) - Warm -->
  <rect x="450" y="93" width="190" height="14" rx="7" fill="#B09A82" opacity="0.85"/>
  <!-- Segment 4: Ship (Week 7-8) - Coral -->
  <rect x="645" y="93" width="190" height="14" rx="7" fill="#C2807A" opacity="0.85"/>

  <!-- Dot markers -->
  <circle cx="60" cy="100" r="8" fill="#5B9B8E" stroke="white" stroke-width="3"/>
  <circle cx="255" cy="100" r="8" fill="#7E97AD" stroke="white" stroke-width="3"/>
  <circle cx="450" cy="100" r="8" fill="#B09A82" stroke="white" stroke-width="3"/>
  <circle cx="645" cy="100" r="8" fill="#C2807A" stroke="white" stroke-width="3"/>
  <circle cx="840" cy="100" r="8" fill="#6B7280" stroke="white" stroke-width="3"/>

  <!-- Labels above -->
  <text x="155" y="55" text-anchor="middle" font-size="15" font-weight="700" fill="#3E6B61">Research &amp; Synthesis</text>
  <text x="155" y="75" text-anchor="middle" font-size="12" fill="#6B7280">Weeks 1–2</text>

  <text x="350" y="55" text-anchor="middle" font-size="15" font-weight="700" fill="#4E6577">Design Exploration</text>
  <text x="350" y="75" text-anchor="middle" font-size="12" fill="#6B7280">Weeks 3–4</text>

  <text x="545" y="55" text-anchor="middle" font-size="15" font-weight="700" fill="#6B5C48">Eng Specs &amp; Handoff</text>
  <text x="545" y="75" text-anchor="middle" font-size="12" fill="#6B7280">Weeks 5–6</text>

  <text x="740" y="55" text-anchor="middle" font-size="15" font-weight="700" fill="#8B554E">Implementation &amp; QA</text>
  <text x="740" y="75" text-anchor="middle" font-size="12" fill="#6B7280">Weeks 7–8</text>

  <!-- Bottom annotations -->
  <text x="155" y="140" text-anchor="middle" font-size="11" fill="#5B9B8E">10 interviews</text>
  <text x="155" y="155" text-anchor="middle" font-size="11" fill="#5B9B8E">Affinity mapping</text>

  <text x="350" y="140" text-anchor="middle" font-size="11" fill="#7E97AD">Prototyping</text>
  <text x="350" y="155" text-anchor="middle" font-size="11" fill="#7E97AD">Usability testing</text>

  <text x="545" y="140" text-anchor="middle" font-size="11" fill="#B09A82">Detailed specs</text>
  <text x="545" y="155" text-anchor="middle" font-size="11" fill="#B09A82">Edge cases</text>

  <text x="740" y="140" text-anchor="middle" font-size="11" fill="#C2807A">Build support</text>
  <text x="740" y="155" text-anchor="middle" font-size="11" fill="#C2807A">Quality review</text>
</svg>