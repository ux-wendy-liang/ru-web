<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logo Preview - WL</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #f5f3ee; padding: 40px; }
    h1 { text-align: center; margin-bottom: 40px; color: #1a1a1a; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 32px; max-width: 1000px; margin: 0 auto; }
    .card { background: white; border-radius: 16px; padding: 32px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card img { width: 80px; height: 80px; margin-bottom: 12px; }
    .card p { font-size: 13px; color: #666; margin: 0; }
    .card .num { font-size: 24px; font-weight: bold; color: #1a1a1a; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h1>Black Circle WL Logos</h1>
  <div class="grid">
    <div class="card">
      <div class="num">#1</div>
      <img src="/images/logo-1.svg" alt="Logo 1">
      <p>Line Separated</p>
    </div>
    <div class="card">
      <div class="num">#2</div>
      <img src="/images/logo-2.svg" alt="Logo 2">
      <p>One Stroke</p>
    </div>
    <div class="card">
      <div class="num">#3</div>
      <img src="/images/logo-3.svg" alt="Logo 3">
      <p>Italic Slant</p>
    </div>
    <div class="card">
      <div class="num">#4</div>
      <img src="/images/logo-4.svg" alt="Logo 4">
      <p>Dot Accent</p>
    </div>
    <div class="card">
      <div class="num">#5</div>
      <img src="/images/logo-5.svg" alt="Logo 5">
      <p>Bold Stencil</p>
    </div>
    <div class="card">
      <div class="num">#6</div>
      <img src="/images/logo-6.svg" alt="Logo 6">
      <p>W + Underline</p>
    </div>
    <div class="card">
      <div class="num">#7</div>
      <img src="/images/logo-7.svg" alt="Logo 7">
      <p>One Stroke + Ring</p>
    </div>
    <div class="card">
      <div class="num">#8</div>
      <img src="/images/logo-8.svg" alt="Logo 8">
      <p>Shared Stroke</p>
    </div>
    <div class="card">
      <div class="num">#9</div>
      <img src="/images/logo-9.svg" alt="Logo 9">
      <p>Filled Zigzag</p>
    </div>
    <div class="card">
      <div class="num">#10</div>
      <img src="/images/logo-10.svg" alt="Logo 10">
      <p>Thick/Thin</p>
    </div>
  </div>
</body>
</html>
