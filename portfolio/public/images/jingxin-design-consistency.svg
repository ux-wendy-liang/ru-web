  <text x="28" y="198" font-family="system-ui, sans-serif" font-size="8" fill="#9CA3AF" font-weight="600" letter-spacing="0.3">SPACING</text>
  <rect x="28" y="204" width="196" height="52" rx="4" fill="white" stroke="#E5E7EB" stroke-width="0.5"/>
