<svg viewBox="0 0 680 300" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ========== BEFORE ========== -->
  <text x="165" y="24" font-family="Lato, sans-serif" font-size="11" font-weight="700" fill="#9CA3AF" text-anchor="middle" letter-spacing="1.5">BEFORE</text>

  <rect x="20" y="38" width="290" height="240" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="5 3"/>

  <!-- Step 1 label -->
  <circle cx="52" cy="68" r="12" fill="#F3F4F6"/>
  <text x="52" y="72" font-family="Lato, sans-serif" font-size="10" font-weight="700" fill="#9CA3AF" text-anchor="middle">1</text>
  <text x="72" y="72" font-family="Lato, sans-serif" font-size="13" fill="#6B7280" text-anchor="start">Select a dataset first</text>

  <!-- Dataset dropdown mock -->
  <rect x="52" y="86" width="230" height="36" rx="8" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="68" y="108" font-family="Lato, sans-serif" font-size="12" fill="#9CA3AF">dataset_product_metrics_v2</text>
  <path d="M262,100 L268,106 L274,100" stroke="#9CA3AF" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Step 2 label -->
  <circle cx="52" cy="148" r="12" fill="#F3F4F6"/>
  <text x="52" y="152" font-family="Lato, sans-serif" font-size="10" font-weight="700" fill="#9CA3AF" text-anchor="middle">2</text>
  <text x="72" y="152" font-family="Lato, sans-serif" font-size="13" fill="#6B7280" text-anchor="start">Then pick a technical filter</text>

  <!-- Filter dropdown mock -->
  <rect x="52" y="166" width="230" height="36" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="68" y="188" font-family="Lato, sans-serif" font-size="12" fill="#991B1B">country_code</text>
  <path d="M262,180 L268,186 L274,180" stroke="#9CA3AF" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Confused face -->
  <text x="165" y="240" font-family="Lato, sans-serif" font-size="12" fill="#9CA3AF" text-anchor="middle" font-style="italic">"What's a dataset?"</text>

  <!-- ========== Arrow ========== -->
  <line x1="326" y1="158" x2="366" y2="158" stroke="#9CA3AF" stroke-width="1.5"/>
  <path d="M363,153 L370,158 L363,163" stroke="#9CA3AF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ========== AFTER ========== -->
  <text x="515" y="24" font-family="Lato, sans-serif" font-size="11" font-weight="700" fill="#5B9B8E" text-anchor="middle" letter-spacing="1.5">AFTER</text>

  <rect x="380" y="38" width="280" height="240" rx="12" fill="white" stroke="#5B9B8E" stroke-width="1.5"/>

  <!-- Simple label -->
  <text x="520" y="76" font-family="Lato, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">Just pick what you need:</text>

  <!-- Clean filter chips -->
  <rect x="412" y="94" width="100" height="36" rx="18" fill="#E8F4F1" stroke="#5B9B8E" stroke-width="1"/>
  <text x="462" y="116" font-family="Lato, sans-serif" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">Country</text>

  <rect x="524" y="94" width="100" height="36" rx="18" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="574" y="116" font-family="Lato, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">Date</text>

  <rect x="412" y="142" width="100" height="36" rx="18" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="462" y="164" font-family="Lato, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">Device</text>

  <rect x="524" y="142" width="100" height="36" rx="18" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="574" y="164" font-family="Lato, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">Language</text>

  <!-- Happy result -->
  <text x="520" y="220" font-family="Lato, sans-serif" font-size="12" fill="#5B9B8E" text-anchor="middle" font-style="italic">"I can do this myself!"</text>
</svg>
