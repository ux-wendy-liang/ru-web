<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Style 9: Abstract - W as zigzag, L as corner, bold fills -->
  <circle cx="20" cy="20" r="19" fill="#1a1a1a"/>
  <!-- W as filled zigzag shape -->
  <path d="M5,12 L10,12 L13,20 L16,12 L20,12 L13,30 L9,30 Z" fill="#ffffff"/>
  <path d="M16,12 L21,12 L24,20 L27,12 L32,12 L25,30 L21,30 Z" fill="#ffffff" opacity="0.6"/>
  <!-- L as corner mark -->
  <rect x="30" y="12" width="3" height="18" rx="1" fill="#ffffff"/>
  <rect x="30" y="27" width="7" height="3" rx="1" fill="#ffffff"/>
</svg>
