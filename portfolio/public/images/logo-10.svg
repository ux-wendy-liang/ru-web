<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Style 10: Elegant thick/thin contrast strokes -->
  <circle cx="20" cy="20" r="19" fill="#1a1a1a"/>
  <!-- W with alternating thick/thin strokes -->
  <path d="M6,12 L10,27" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M10,27 L15,15" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M15,15 L20,27" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M20,27 L25,12" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round"/>
  <!-- L with thick vertical, thin horizontal -->
  <line x1="29" y1="12" x2="29" y2="27" stroke="#ffffff" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="29" y1="27" x2="35" y2="27" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round"/>
</svg>
