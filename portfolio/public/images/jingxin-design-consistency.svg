  <rect x="28" y="138" width="196" height="40" rx="4" fill="white" stroke="#E5E7EB" stroke-width="0.5"/>
  <text x="36" y="155" font-family="system-ui, sans-serif" font-size="14" fill="#374151" font-weight="700">Meditation</text>
  <text x="120" y="155" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280" font-weight="400">Dharma Talks</text>
  <!-- Size mismatch indicator -->
  <line x1="36" y1="162" x2="100" y2="162" stroke="#C2807A" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="120" y1="162" x2="180" y2="162" stroke="#C2807A" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="68" y="172" font-family="system-ui, sans-serif" font-size="7" fill="#C2807A" text-anchor="middle">14px</text>
  <text x="150" y="172" font-family="system-ui, sans-serif" font-size="7" fill="#C2807A" text-anchor="middle">10px</text>

