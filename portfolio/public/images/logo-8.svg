<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Style 8: Overlapping - W and L share the vertical stroke -->
  <circle cx="20" cy="20" r="19" fill="#1a1a1a"/>
  <!-- W -->
  <path d="M6,12 L10,26 L15,16 L20,26 L24,12" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- L shares the last stroke of W - vertical continues down -->
  <line x1="24" y1="12" x2="24" y2="29" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="29" x2="34" y2="29" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
</svg>
