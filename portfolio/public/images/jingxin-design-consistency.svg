  <line x1="260" y1="50" x2="260" y2="230" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Arrow -->
  <polygon points="254,140 266,140 260,128" fill="#D1D5DB" transform="rotate(90, 260, 140)"/>
  <rect x="248" y="132" width="24" height="16" rx="8" fill="#F9FAFB"/>
  <polygon points="252,140 268,140 260,140" fill="none"/>
  <path d="M252 140 L262 134 L262 138 L272 138 L272 142 L262 142 L262 146 Z" fill="#5B9B8E" opacity="0.5"/>

