  <text x="390" y="38" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#3E6B61" text-anchor="middle" letter-spacing="0.5">AFTER</text>
  <text x="390" y="52" font-family="system-ui, sans-serif" font-size="9" fill="#3E6B61" text-anchor="middle" opacity="0.7">Design system applied</text>

  <!-- After: Buttons row -->
  <text x="289" y="78" font-family="system-ui, sans-serif" font-size="8" fill="#9CA3AF" font-weight="600" letter-spacing="0.3">BUTTONS</text>
  <!-- Consistent rounded buttons -->
  <rect x="289" y="84" width="72" height="26" rx="13" fill="none" stroke="#5B9B8E" stroke-width="1.5"/>
  <text x="325" y="101" font-family="system-ui, sans-serif" font-size="9" fill="#5B9B8E" text-anchor="middle" font-weight="600">Start</text>
  <rect x="373" y="84" width="72" height="26" rx="13" fill="none" stroke="#5B9B8E" stroke-width="1.5"/>
  <text x="409" y="101" font-family="system-ui, sans-serif" font-size="9" fill="#5B9B8E" text-anchor="middle" font-weight="600">Begin</text>
  <!-- Check icon -->
  <circle cx="459" cy="97" r="7" fill="#5B9B8E" opacity="0.15"/>
  <path d="M455 97 L458 100 L463 94" stroke="#5B9B8E" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- After: Text sizes row -->
  <text x="289" y="132" font-family="system-ui, sans-serif" font-size="8" fill="#9CA3AF" font-weight="600" letter-spacing="0.3">HEADINGS</text>
  <rect x="289" y="138" width="196" height="40" rx="4" fill="white" stroke="#E5E7EB" stroke-width="0.5"/>
  <text x="297" y="155" font-family="system-ui, sans-serif" font-size="12" fill="#374151" font-weight="700">Meditation</text>
  <text x="385" y="155" font-family="system-ui, sans-serif" font-size="12" fill="#374151" font-weight="700">Dharma Talks</text>
  <!-- Matching size indicator -->
  <line x1="297" y1="162" x2="365" y2="162" stroke="#5B9B8E" stroke-width="1" stroke-dasharray="2 2"/>
  <line x1="385" y1="162" x2="460" y2="162" stroke="#5B9B8E" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="331" y="172" font-family="system-ui, sans-serif" font-size="7" fill="#5B9B8E" text-anchor="middle">12px</text>
  <text x="422" y="172" font-family="system-ui, sans-serif" font-size="7" fill="#5B9B8E" text-anchor="middle">12px</text>

  <!-- After: Spacing row -->
  <text x="289" y="198" font-family="system-ui, sans-serif" font-size="8" fill="#9CA3AF" font-weight="600" letter-spacing="0.3">SPACING</text>
  <rect x="289" y="204" width="196" height="52" rx="4" fill="white" stroke="#E5E7EB" stroke-width="0.5"/>
  <!-- Even cards -->
  <rect x="297" y="210" width="56" height="18" rx="3" fill="#F0F6F5" stroke="#5B9B8E" stroke-width="0.5" opacity="0.6"/>
  <text x="325" y="222" font-family="system-ui, sans-serif" font-size="7" fill="#3E6B61" text-anchor="middle">Card A</text>
  <rect x="365" y="210" width="56" height="18" rx="3" fill="#F0F6F5" stroke="#5B9B8E" stroke-width="0.5" opacity="0.6"/>
  <text x="393" y="222" font-family="system-ui, sans-serif" font-size="7" fill="#3E6B61" text-anchor="middle">Card B</text>
  <rect x="433" y="210" width="44" height="18" rx="3" fill="#F0F6F5" stroke="#5B9B8E" stroke-width="0.5" opacity="0.6"/>
  <text x="455" y="222" font-family="system-ui, sans-serif" font-size="7" fill="#3E6B61" text-anchor="middle">Card C</text>
  <!-- Even spacing markers -->
  <line x1="353" y1="215" x2="365" y2="215" stroke="#5B9B8E" stroke-width="0.8"/>
  <text x="359" y="212" font-family="system-ui, sans-serif" font-size="6" fill="#5B9B8E" text-anchor="middle">12</text>
  <line x1="421" y1="215" x2="433" y2="215" stroke="#5B9B8E" stroke-width="0.8"/>
  <text x="427" y="212" font-family="system-ui, sans-serif" font-size="6" fill="#5B9B8E" text-anchor="middle">12</text>

  <!-- Bottom row: even cards row 2 -->
  <rect x="297" y="234" width="56" height="18" rx="3" fill="#F0F6F5" stroke="#5B9B8E" stroke-width="0.5" opacity="0.6"/>
  <text x="325" y="246" font-family="system-ui, sans-serif" font-size="7" fill="#3E6B61" text-anchor="middle">Card D</text>
  <rect x="365" y="234" width="56" height="18" rx="3" fill="#F0F6F5" stroke="#5B9B8E" stroke-width="0.5" opacity="0.6"/>
  <text x="393" y="246" font-family="system-ui, sans-serif" font-size="7" fill="#3E6B61" text-anchor="middle">Card E</text>
  <rect x="433" y="234" width="44" height="18" rx="3" fill="#F0F6F5" stroke="#5B9B8E" stroke-width="0.5" opacity="0.6"/>
  <text x="455" y="246" font-family="system-ui, sans-serif" font-size="7" fill="#3E6B61" text-anchor="middle">Card F</text>
