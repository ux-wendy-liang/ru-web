<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" fill="none">
  <!-- Background -->
  <rect width="520" height="280" rx="8" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>

  <!-- LEFT SIDE: Before -->
  <rect x="12" y="12" width="235" height="256" rx="6" fill="#FFFBFA" stroke="#C2807A" stroke-width="1" stroke-dasharray="4 2" opacity="0.6"/>

  <!-- Before label -->
  <text x="129" y="38" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#8B554E" text-anchor="middle" letter-spacing="0.5">BEFORE</text>
  <text x="129" y="52" font-family="system-ui, sans-serif" font-size="9" fill="#8B554E" text-anchor="middle" opacity="0.7">Visual inconsistency</text>

  <!-- Before: Buttons row -->
  <text x="28" y="78" font-family="system-ui, sans-serif" font-size="8" fill="#9CA3AF" font-weight="600" letter-spacing="0.3">BUTTONS</text>
  <!-- Rounded button -->
  <rect x="28" y="84" width="72" height="26" rx="13" fill="none" stroke="#C2807A" stroke-width="1.5"/>
  <text x="64" y="101" font-family="system-ui, sans-serif" font-size="9" fill="#C2807A" text-anchor="middle" font-weight="600">Start</text>
  <!-- Sharp corner button (inconsistent!) -->
  <rect x="112" y="84" width="72" height="26" rx="2" fill="#C2807A" opacity="0.15" stroke="#C2807A" stroke-width="1.5"/>
  <text x="148" y="101" font-family="system-ui, sans-serif" font-size="11" fill="#C2807A" text-anchor="middle" font-weight="400">Begin</text>
  <!-- Warning icon -->
  <circle cx="198" cy="97" r="7" fill="#C2807A" opacity="0.15"/>
  <text x="198" y="100" font-family="system-ui, sans-serif" font-size="9" fill="#C2807A" text-anchor="middle" font-weight="700">!</text>

  <!-- Before: Text sizes row -->
