  <line x1="92" y1="215" x2="100" y2="215" stroke="#C2807A" stroke-width="0.8"/>
  <text x="96" y="212" font-family="system-ui, sans-serif" font-size="6" fill="#C2807A" text-anchor="middle">8</text>
  <line x1="156" y1="228" x2="156" y2="234" stroke="#C2807A" stroke-width="0.8"/>
  <text x="162" y="232" font-family="system-ui, sans-serif" font-size="6" fill="#C2807A">6</text>

